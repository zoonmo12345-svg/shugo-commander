<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슈고상회 - 전술지도</title>
  <style>
    /* 아이콘 스케일 조절을 위한 전역 CSS 변수 */
    :root {
      --icon-scale: 1;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #fff;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.5s;
    }

    /* 사이드바 UI 및 숨기기 애니메이션 */
    #sidebar {
      width: 300px;
      min-width: 300px;
      box-sizing: border-box;
      background: rgba(30, 30, 36, 0.95);
      border-right: 2px solid #333;
      padding: 20px;
      display: flex;
      flex-direction: column;
      z-index: 100;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      transition: margin-left 0.3s ease;
      position: relative;
    }

    /* 사이드바 숨기기 토글 버튼 */
    #sidebar-toggle {
      position: absolute;
      top: 50%;
      right: -30px;
      width: 30px;
      height: 60px;
      background: #1e1e24;
      border: 2px solid #333;
      border-left: none;
      border-radius: 0 8px 8px 0;
      color: #ffaa00;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transform: translateY(-50%);
      font-weight: bold;
      box-shadow: 2px 0 5px rgba(0,0,0,0.5);
    }
    #sidebar-toggle:hover { background: #2a2a35; }

    h2 { margin-top: 0; color: #ffaa00; font-size: 1.4rem; text-align: center; }
    .info-panel { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    
    /* 지도 선택 & 도구 & 슬라이더 */
    .section-title { font-size: 0.9rem; color: #aaa; margin-bottom: 5px; margin-top: 15px; }
    select, button {
      width: 100%; padding: 10px; margin-bottom: 5px;
      background: #2a2a35; color: #fff; border: 1px solid #444; border-radius: 5px; cursor: pointer;
    }
    button:hover { background: #3a3a45; }
    .tool-btn.active { border: 2px solid #ffaa00; background: #4a3a25; font-weight: bold; }
    .danger-btn { background: #ff4757; color: white; font-weight: bold; margin-top: auto; }
    .danger-btn:hover { background: #ff6b81; }

    /* 슬라이더(Range) 스타일 */
    input[type=range] { width: 100%; cursor: pointer; }

    /* 깃발 도구 그룹 */
    .tool-group {
      background: #2a2a35; border: 1px solid #444; border-radius: 5px; padding: 5px; margin-bottom: 5px;
    }
    .tool-group button { margin-bottom: 5px; border: none; background: transparent; padding: 5px; }
    .tool-group.active { border: 2px solid #ffaa00; background: #4a3a25; }
    .flag-options { display: flex; justify-content: space-around; font-size: 0.8rem; margin-top: 5px; }

    /* 지도 영역 */
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
      cursor: grab;
    }
    #map-container:active { cursor: grabbing; }
    #map-image-wrapper {
      position: absolute;
      transform-origin: 0 0;
    }
    #map-image {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 핑 마커 공통 (여기서 var(--icon-scale) 적용) */
    .ping {
      position: absolute;
      transform: translate(-50%, -50%) scale(var(--icon-scale));
      cursor: pointer;
      pointer-events: auto;
      transform-origin: center center;
    }
    .ping img { width: 100%; height: 100%; display: block; filter: drop-shadow(0 0 3px rgba(0,0,0,0.8)); }
    
    /* 여기라거~! 핑 애니메이션 */
    .ping-here {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      animation: ripple 1s ease-out infinite;
    }
    @keyframes ripple {
      0% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0.8); }
      100% { box-shadow: 0 0 0 15px rgba(255, 170, 0, 0); }
    }
    
    /* 플레이어 핑 (CSS 전용) */
    .ping-player { 
      width: 14px; height: 14px; 
      border-radius: 50%; 
      border: 2px solid #fff; 
      box-shadow: 0 0 4px rgba(0,0,0,0.8); 
    }
    
    /* 좌측 하단 스크롤 영역 (도구가 많아져서 스크롤 추가) */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }
    /* 스크롤바 꾸미기 */
    .scroll-area::-webkit-scrollbar { width: 6px; }
    .scroll-area::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  </style>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-toggle" onclick="toggleSidebar()">◀</div>
    <h2>슈고상회 통제실</h2>
    <div class="info-panel" id="userInfo">정보 불러오는 중...</div>

    <div class="scroll-area">
      <div class="section-title">지도 선택</div>
      <select id="mapSelect" onchange="changeMap()">
        <option value="bermap">천족의 땅 (베르테른)</option>
        <option value="under">어비스 하층</option>
        <option value="middle">어비스 중층</option>
      </select>

      <div class="section-title">환경 설정</div>
      <div style="font-size: 0.8rem; color: #ccc; margin-bottom: 3px;">사운드 볼륨</div>
      <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" onchange="testVolume()">
      
      <div style="font-size: 0.8rem; color: #ccc; margin-top: 10px; margin-bottom: 3px;">아이콘 크기 조절</div>
      <input type="range" id="size-slider" min="0.3" max="3" step="0.1" value="1" oninput="updateIconSize()">

      <div class="section-title">핑 도구 (클릭하여 선택)</div>
      <button class="tool-btn active" id="btn-player" onclick="setTool('player', this)">🟢 플레이어 핑 (기본)</button>
      <button class="tool-btn" id="btn-here" onclick="setTool('here', this)">✨ 여기라거~!(1회성)</button>
      <button class="tool-btn" id="btn-rally-black" onclick="setTool('rally_black', this)">⬇️ 집결!(노란색)</button>
      <button class="tool-btn" id="btn-rally-white" onclick="setTool('rally_white', this)">⬇️ 집결!(녹색)</button>
      
      <div class="tool-group" id="group-flag">
        <button onclick="setTool('flag', this.parentElement)" style="width:100%; color:#fff; font-weight:bold;">🚩 깃발 찍기</button>
        <div class="flag-options">
          <label><input type="radio" name="flagColor" value="red" checked onchange="updateFlagTool()"> 적</label>
          <label><input type="radio" name="flagColor" value="black" onchange="updateFlagTool()"> 흑</label>
          <label><input type="radio" name="flagColor" value="white" onchange="updateFlagTool()"> 백</label>
          <label><input type="radio" name="flagColor" value="green" onchange="updateFlagTool()"> 녹</label>
        </div>
      </div>

      <button class="tool-btn" id="btn-kisk-elyos" onclick="setTool('kisk_elyos', this)">⛺ 천족 키스크</button>
      <button class="tool-btn" id="btn-kisk-asmo" onclick="setTool('kisk_asmo', this)">⛺ 슈고 키스크</button>
    </div>

    <button class="danger-btn" onclick="clearPings()">🗑️ 현재 맵 징표 초기화</button>
  </div>

  <div id="map-container">
    <div id="map-image-wrapper">
      <img id="map-image" src="maps/bermap.webp" alt="Map">
    </div>
  </div>

  <script>
    // 1. 초기 세팅 및 인증 체크
    const roomCode = sessionStorage.getItem('roomCode');
    const myColor = sessionStorage.getItem('myColor');
    const myId = sessionStorage.getItem('myShugoId');

    if(!roomCode || !myColor || !myId) {
      alert("정상적인 접근이 아니다. 입구로 돌아가라.");
      window.location.href = 'index.html';
    }

    // 배경색 개인화 적용 & 색상 직사각형 표시
    if(myColor !== 'spectator') {
      document.body.style.backgroundColor = hexToRgba(myColor, 0.15);
      document.getElementById('userInfo').innerHTML = `
        내 색상: <div style="display:inline-block; width:80px; height:18px; background-color:${myColor}; vertical-align:middle; border:1px solid #fff; border-radius:3px; margin-left:5px; box-shadow:0 0 5px rgba(0,0,0,0.5);"></div>
      `;
    } else {
      document.getElementById('userInfo').innerHTML = `
        <span style="color:#ff4757; font-weight:bold;">👀 관전 모드 (조작 불가)</span>
      `;
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // 2. 파이어베이스 세팅
    const firebaseConfig = {
      apiKey: "AIzaSyAvNgX4nUmo3dsdij2jKr_L4Kq-yfPldOw",
      authDomain: "aion2-commander.firebaseapp.com",
      databaseURL: "https://aion2-commander-default-rtdb.firebaseio.com",
      projectId: "aion2-commander",
      storageBucket: "aion2-commander.firebasestorage.app",
      messagingSenderId: "694179587640",
      appId: "1:694179587640:web:df4dd76e882cb9d6cb28cd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 3. 변수 및 매핑
    let currentMap = 'bermap';
    let currentTool = 'player';
    let flagColorVal = 'red';
    let globalVolume = 0.5;
    let sidebarOpen = true;
    let mapDataRef = db.ref(`rooms/${roomCode}/maps/${currentMap}/pings`);

    const mapFiles = {
      'bermap': 'maps/bermap.webp',
      'under': 'maps/under.png',
      'middle': 'maps/middle.png'
    };

    const iconConfig = {
      'rally_black': { src: 'icons/rally_black.png', size: 32 },
      'rally_white': { src: 'icons/rally_white.png', size: 32 },
      'flag_red': { src: 'icons/flag_red.png', size: 16 },
      'flag_black': { src: 'icons/flag_black.png', size: 16 },
      'flag_white': { src: 'icons/flag_white.png', size: 16 },
      'flag_green': { src: 'icons/flag_green.png', size: 16 },
      'kisk_elyos': { src: 'icons/kisk_elyos.png', size: 24 },
      'kisk_asmo': { src: 'icons/kisk_asmo.png', size: 24 } 
    };

    // 사운드 세팅
    const sounds = {
      'here': new Audio('sounds/here.mp3'),
      'come': new Audio('sounds/come.mp3'),
      'player': new Audio('sounds/player.mp3')
    };
    const beepSound = new Audio('sounds/beep_sound.mp3');

    function playSound(type) {
      if(sounds[type]) {
        sounds[type].volume = globalVolume;
        sounds[type].currentTime = 0;
        sounds[type].play().catch(e => console.log("소리 재생 실패"));
      }
    }

    function testVolume() {
      globalVolume = parseFloat(document.getElementById('vol-slider').value);
      beepSound.volume = globalVolume;
      beepSound.currentTime = 0;
      beepSound.play().catch(e => console.log("테스트 소리 재생 실패"));
    }

    // 아이콘 크기 글로벌 조절
    function updateIconSize() {
      const scaleVal = document.getElementById('size-slider').value;
      document.documentElement.style.setProperty('--icon-scale', scaleVal);
    }

    // 통제실 숨기기 애니메이션
    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const btn = document.getElementById('sidebar-toggle');
      if(sidebarOpen) {
        sb.style.marginLeft = '-300px';
        btn.innerText = '▶';
      } else {
        sb.style.marginLeft = '0';
        btn.innerText = '◀';
      }
      sidebarOpen = !sidebarOpen;
    }

    // 4. 툴 선택 로직 (깃발 라디오 버튼 연동)
    function updateFlagTool() {
      flagColorVal = document.querySelector('input[name="flagColor"]:checked').value;
      if(currentTool.startsWith('flag_')) {
        currentTool = 'flag_' + flagColorVal;
      }
    }

    function setTool(tool, element) {
      document.querySelectorAll('.tool-btn, .tool-group').forEach(b => b.classList.remove('active'));
      element.classList.add('active');
      
      if(tool === 'flag') {
        currentTool = 'flag_' + flagColorVal;
      } else {
        currentTool = tool;
      }
    }

    function changeMap() {
      currentMap = document.getElementById('mapSelect').value;
      document.getElementById('map-image').src = mapFiles[currentMap];
      
      mapDataRef.off(); 
      mapDataRef = db.ref(`rooms/${roomCode}/maps/${currentMap}/pings`);
      loadPings();
      
      scale = 1; posX = 0; posY = 0;
      updateMapTransform();
    }

    // 5. 마우스 기준 드래그 & 줌 로직
    const container = document.getElementById('map-container');
    const wrapper = document.getElementById('map-image-wrapper');
    let scale = 1, posX = 0, posY = 0;
    let isDragging = false;
    let startMouseX, startMouseY, initialPosX, initialPosY;

    container.addEventListener('mousedown', (e) => {
      if(e.target.closest('.ping') || e.target.closest('#sidebar')) return;
      isDragging = false;
      startMouseX = e.clientX;
      startMouseY = e.clientY;
      initialPosX = posX;
      initialPosY = posY;
    });

    window.addEventListener('mousemove', (e) => {
      if (startMouseX === undefined) return;
      const dx = e.clientX - startMouseX;
      const dy = e.clientY - startMouseY;
      
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        isDragging = true;
        posX = initialPosX + dx;
        posY = initialPosY + dy;
        updateMapTransform();
      }
    });

    window.addEventListener('mouseup', () => { 
      startMouseX = undefined; 
    });
    window.addEventListener('mouseleave', () => { 
      startMouseX = undefined; 
    });

    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomAmount = e.deltaY > 0 ? -0.1 : 0.1;
      const newScale = Math.min(Math.max(0.5, scale + zoomAmount), 4);

      const rect = container.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      const mapX = (mouseX - posX) / scale;
      const mapY = (mouseY - posY) / scale;

      scale = newScale;
      posX = mouseX - mapX * scale;
      posY = mouseY - mapY * scale;

      updateMapTransform();
    });

    function updateMapTransform() {
      wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    // 6. 핑 찍기 & 삭제 로직
    wrapper.addEventListener('click', (e) => {
      if(isDragging) {
        isDragging = false; 
        return; 
      }
      if(myColor === 'spectator') return;

      const rect = wrapper.getBoundingClientRect();
      const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
      const yPercent = ((e.clientY - rect.top) / rect.height) * 100;

      const clickedPing = e.target.closest('.ping');
      if (clickedPing && currentTool !== 'here') {
        const pingId = clickedPing.dataset.id;
        const pingOwner = clickedPing.dataset.owner;
        const pingType = clickedPing.dataset.type;

        if (pingOwner === myId || pingType.includes('kisk') || pingType.includes('flag') || pingType.includes('rally')) {
           mapDataRef.child(pingId).remove();
           return;
        }
      }

      const pingId = currentTool === 'player' ? `player_${myId}` 
                   : currentTool.includes('flag') ? `flag_${currentTool}` 
                   : currentTool.includes('rally') ? `rally_${currentTool}` 
                   : `ping_${Date.now()}_${Math.random().toString(36).substr(2,5)}`; 

      const newPing = {
        type: currentTool,
        x: xPercent,
        y: yPercent,
        owner: myId,
        color: myColor,
        timestamp: firebase.database.ServerValue.TIMESTAMP
      };

      if (currentTool === 'here') {
        mapDataRef.child(pingId).set(newPing);
        setTimeout(() => { mapDataRef.child(pingId).remove(); }, 5000);
        playSound('here');
      } else {
        mapDataRef.child(pingId).set(newPing);
        if(currentTool === 'player') playSound('player');
        if(currentTool.includes('rally')) playSound('come');
      }
    });

    // 7. 실시간 핑 렌더링
    function loadPings() {
      mapDataRef.on('value', (snapshot) => {
        document.querySelectorAll('.ping').forEach(el => el.remove());
        const data = snapshot.val();
        if(!data) return;

        Object.keys(data).forEach(key => {
          drawPing(key, data[key]);
        });
      });
    }

    function drawPing(id, data) {
      const el = document.createElement('div');
      el.className = 'ping';
      el.dataset.id = id;
      el.dataset.owner = data.owner;
      el.dataset.type = data.type;
      el.style.left = `${data.x}%`;
      el.style.top = `${data.y}%`;

      if (data.type === 'here') {
        el.classList.add('ping-here');
        el.style.borderColor = data.color; 
      } else if (data.type === 'player') {
        el.classList.add('ping-player');
        el.style.backgroundColor = data.color;
      } else {
        const config = iconConfig[data.type];
        if(!config) return;

        el.style.width = `${config.size}px`;
        el.style.height = `${config.size}px`;

        const img = document.createElement('img');
        img.src = config.src;
        el.appendChild(img);
      }

      wrapper.appendChild(el);
    }

    // 8. 초기화 버튼
    function clearPings() {
      if(myColor === 'spectator') return alert("관전자는 초기화 권한이 없다.");
      if(confirm("진짜로 이 맵의 모든 징표를 날려버릴 거냐?")) {
        mapDataRef.remove();
      }
    }

    loadPings();
  </script>
</body>
</html>
